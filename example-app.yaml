# Example ArgoCD Application — same shape as the one in
# stanley-bank-k8s/bank-project/argocd-app.yaml. Apply this once after
# the Terraform run to bootstrap GitOps, then ArgoCD will manage the
# deployment going forward (and will overwrite this file's path through
# self-healing).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stanley-bank-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Stanleyoluebube/stanley-bank-k8s
    targetRevision: HEAD
    path: bank-project
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true