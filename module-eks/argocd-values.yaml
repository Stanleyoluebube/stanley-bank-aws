# ArgoCD values for a single-replica, non-HA install.
# server.insecure = false because we terminate TLS at the nginx ingress
# in front of argocd-server, which uses cert-manager + Let's Encrypt.

global:
  image:
    tag: v2.11.3

server:
  replicas: 1
  service:
    type: ClusterIP
  extraArgs:
    - --insecure

controller:
  replicas: 1

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

redis:
  enabled: true

configs:
  params:
    server.insecure: false